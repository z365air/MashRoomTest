<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MashRoom Test</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo-group">
        <svg class="logo-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <!-- Shadow -->
          <ellipse cx="32" cy="58" rx="16" ry="4" fill="rgba(0,0,0,0.2)"/>
          <!-- Body -->
          <ellipse cx="32" cy="46" rx="16" ry="13" fill="#F0DCB8"/>
          <!-- Cap outline -->
          <ellipse cx="32" cy="25" rx="29" ry="24" fill="#8B1010"/>
          <!-- Cap fill -->
          <ellipse cx="32" cy="25" rx="27" ry="22" fill="#C02020"/>
          <!-- Redraw body to clip cap -->
          <ellipse cx="32" cy="46" rx="16" ry="13" fill="#F0DCB8"/>
          <!-- Spots -->
          <ellipse cx="32" cy="11" rx="5" ry="4.5" fill="rgba(255,255,235,0.9)"/>
          <ellipse cx="19" cy="21" rx="4" ry="3.5" fill="rgba(255,255,235,0.88)"/>
          <ellipse cx="45" cy="19" rx="4" ry="3.5" fill="rgba(255,255,235,0.88)"/>
          <!-- Eyes -->
          <ellipse cx="26" cy="38" rx="3.5" ry="3" fill="#FFF5E0"/>
          <ellipse cx="38" cy="38" rx="3.5" ry="3" fill="#FFF5E0"/>
          <ellipse cx="26" cy="38.5" rx="1.8" ry="1.6" fill="#1A0808"/>
          <ellipse cx="38" cy="38.5" rx="1.8" ry="1.6" fill="#1A0808"/>
          <!-- Eyebrows (angry) -->
          <line x1="23" y1="34" x2="29" y2="36" stroke="#1A0808" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="35" y1="36" x2="41" y2="34" stroke="#1A0808" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Mics -->
          <line x1="20" y1="54" x2="30" y2="44" stroke="#B02020" stroke-width="2.5" stroke-linecap="round"/>
          <ellipse cx="30" cy="44" rx="3" ry="3.2" fill="#999"/>
          <line x1="34" y1="44" x2="44" y2="54" stroke="#B02020" stroke-width="2.5" stroke-linecap="round"/>
          <ellipse cx="34" cy="44" rx="3" ry="3.2" fill="#999"/>
        </svg>
        <div class="logo-text">
          <span class="logo-mash">Mash</span><span class="logo-room">Room</span>
          <span class="logo-sub">Test</span>
        </div>
      </div>
    </header>

    <div class="popup-body">
      <button class="btn-open-editor" id="openEditor">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/>
        </svg>
        Open Editor
      </button>

      <div class="quick-stats" id="quickStats">
        <div class="stat-item" id="statProjects">
          <span class="stat-value" id="projectCount">—</span>
          <span class="stat-label">Saved Projects</span>
        </div>
        <div class="stat-item" id="statTracks">
          <span class="stat-value" id="lastTracks">—</span>
          <span class="stat-label">Last Tracks</span>
        </div>
      </div>

      <div class="recent-section" id="recentSection" style="display:none">
        <h3 class="section-title">Recent Projects</h3>
        <ul class="recent-list" id="recentList"></ul>
      </div>
    </div>

    <footer class="popup-footer">
      <span class="version">v1.0.0</span>
      <a class="footer-link" href="#" id="clearData">Clear data</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
